train_dataset:
  dataset:
    name: triple-image-folders
    args:
      root_path_1: ./load/fusion/train/vi
      root_path_2: ./load/fusion/train/ir
      root_path_3: ./load/fusion/train/gt
      repeat: 20
      cache: in_memory
  wrapper:
    name: fusion-implicit-paired
    args:
      inp_size: 128
      out_size: 256
      augment: true
      sample_q: 8192
      target_mode: avg
  batch_size: 4

val_dataset:
  dataset:
    name: triple-image-folders
    args:
      root_path_1: ./load/fusion/val/vi
      root_path_2: ./load/fusion/val/ir
      root_path_3: ./load/fusion/val/gt
      first_k: 10
      repeat: 160
      cache: in_memory
  wrapper:
    name: fusion-implicit-paired
    args:
      inp_size: 128
      out_size: 256
      sample_q: 8192
      target_mode: avg
  batch_size: 4

data_norm:
  inp: {sub: [0.5], div: [0.5]}
  gt: {sub: [0.5], div: [0.5]}

model:
  name: fusion-liif
  args:
    encoder_spec:
      name: edsr-baseline
      args:
        no_upsampling: true
        n_colors: 1
    imnet_spec:
      name: mlp
      args:
        out_dim: 1
        hidden_list: [256, 256, 256, 256]
    metric_dim: 32
    temperature: 0.1
    pretrained_liif: ./edsr-baseline-liif.pth
    freeze_encoder: true

optimizer:
  name: adam
  args:
    lr: 1.e-4
epoch_max: 1000
multi_step_lr:
  milestones: [200, 400, 600, 800]
  gamma: 0.5

epoch_val: 1
epoch_save: 100
vis_val: true
vis_bsize: 65536
