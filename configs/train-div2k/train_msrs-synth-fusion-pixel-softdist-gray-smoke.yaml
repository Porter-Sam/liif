train_dataset:
  dataset:
    name: triple-image-folders
    args:
      root_path_1: E:/YuShihang/project/thermal_residual_synthesis/outputs/msrs_train/visible
      root_path_2: E:/YuShihang/project/thermal_residual_synthesis/outputs/msrs_train/pseudo_ir_ideal
      root_path_3: E:/YuShihang/project/thermal_residual_synthesis/outputs/msrs_train/pseudo_fusion
      first_k: 20
      repeat: 1
      cache: none
  wrapper:
    name: fusion-pixel-paired
    args:
      image_size: 256
      crop_mode: center_resize
      augment: false
      target_mode: avg
  batch_size: 2

val_dataset:
  dataset:
    name: triple-image-folders
    args:
      root_path_1: E:/YuShihang/project/thermal_residual_synthesis/outputs/msrs_train/visible
      root_path_2: E:/YuShihang/project/thermal_residual_synthesis/outputs/msrs_train/pseudo_ir_ideal
      root_path_3: E:/YuShihang/project/thermal_residual_synthesis/outputs/msrs_train/pseudo_fusion
      first_k: 4
      repeat: 1
      cache: none
  wrapper:
    name: fusion-pixel-paired
    args:
      image_size: 256
      crop_mode: center_resize
      augment: false
      target_mode: avg
  batch_size: 2

data_norm:
  inp: {sub: [0.5], div: [0.5]}
  gt: {sub: [0.5], div: [0.5]}

model:
  name: fusion-pixel-soft-distance
  args:
    encoder_spec:
      name: edsr-baseline
      args:
        no_upsampling: true
        n_colors: 1
    hidden_dim: 64
    temperature: 0.7
    residual_scale: 0.25
    pretrained_liif: ./edsr-baseline-liif.pth
    freeze_encoder: true

optimizer:
  name: adam
  args:
    lr: 1.e-4

loss_tv_weight: 0.02
loss_soft_weight: 0.01
distance_eps: 0.03

epoch_max: 1
epoch_val: 1
epoch_save: null
eval_bsize: null
vis_val: true
